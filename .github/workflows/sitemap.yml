name: Generate Sitemap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sitemap.xml
        run: |
          rm -f sitemap.xml

          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          echo '<url><loc>https://stbup318-ux.github.io/kontyuki/</loc></url>' >> sitemap.xml

          find . -name "index.html" | while read file; do
            path=$(echo "$file" | sed 's|^\./||' | sed 's|index.html$||')

            # ディレクトリごとに分割してエンコード
            encoded=""
            IFS='/' read -ra parts <<< "$path"
            for part in "${parts[@]}"; do
              if [ -n "$part" ]; then
                enc=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$part")
                encoded="$encoded/$enc"
              fi
            done

            echo "<url><loc>https://stbup318-ux.github.io/kontyuki$encoded/</loc></url>" >> sitemap.xml
          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit and push sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "Update sitemap.xml" || echo "No changes"
          git push
